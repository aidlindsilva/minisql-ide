<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Markdown Parser IDE</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        h2 { margin-top: 0; color: #ff79c6; }
        .container {
            display: flex;
            flex: 1;
            gap: 20px;
            min-height: 0;
        }
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 5px;
            color: #6272a4;
        }
        textarea {
            flex: 1;
            background-color: #282a36;
            color: #f8f8f2;
            border: 1px solid #44475a;
            border-radius: 6px;
            padding: 15px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 16px;
            resize: none;
            outline: none;
        }
        textarea:focus { border-color: #ff79c6; }
        #preview-window {
            flex: 1;
            background-color: #ffffff;
            color: #2b2b2b;
            border: 1px solid #44475a;
            border-radius: 6px;
            padding: 20px;
            overflow-y: auto;
        }
        
        /* Render Style Accents for the Live Preview Output Document Container */
        #preview-window h1 { border-bottom: 2px solid #eaecef; padding-bottom: 5px; color: #111; margin-top: 0; }
        #preview-window h2 { border-bottom: 1px solid #eaecef; padding-bottom: 3px; color: #222; }
        #preview-window blockquote { border-left: 4px solid #ff79c6; background-color: #f6f8fa; margin: 10px 0; padding: 1px 15px; color: #6a737d; font-style: italic; }
        #preview-window ul { padding-left: 20px; }
        #preview-window strong { color: #000; font-weight: 700; }
        #preview-window p { line-height: 1.6; }
    </style>
</head>
<body>

    <h2>Live Markdown Engine IDE</h2>
    
    <div class="container">
        <div class="panel">
            <label for="editor">Raw Markdown Input Workspace:</label>
            <textarea id="editor" spellcheck="false" oninput="parseLiveDocument()">
# Project Workspace Documentation

Welcome to your live **Markdown Custom Parsing Engine** built entirely from scratch using client-side algorithms!

## Key Engine Features Supported:
* High performance real-time regex string pipeline conversion.
* Custom structural layout rendering context arrays.
* Clean visual encapsulation of raw string text states.

> "The best way to predict the future is to invent it." - Alan Kay

Try typing anywhere inside this workspace block or edit this text layout view directly!
            </textarea>
        </div>

        <div class="panel">
            <label>Live Rendered HTML Output Document:</label>
            <div id="preview-window"></div>
        </div>
    </div>

    <script>
        class MarkdownParser {
            constructor() {
                this.inList = false; // Layout context state validator flag
            }

            parse(text) {
                const lines = text.split('\n');
                let htmlOutput = [];
                this.inList = false;

                for (let line of lines) {
                    let cleanLine = line.trim();

                    // 1. Handle Unordered Bullet List Array States Block Closures
                    if (cleanLine.startsWith('* ') || cleanLine.startsWith('- ')) {
                        if (!this.inList) {
                            htmlOutput.push('<ul>');
                            this.inList = true;
                        }
                        let content = cleanLine.slice(2);
                        htmlOutput.push(`<li>${this.parseInlineStyles(content)}</li>`);
                        continue;
                    } else {
                        // If we were inside a bullet list block, close the tag context state container
                        if (this.inList) {
                            htmlOutput.push('</ul>');
                            this.inList = false;
                        }
                    }

                    // 2. Handle Empty Whitespace Spacer Blocks lines
                    if (cleanLine === '') {
                        continue;
                    }

                    // 3. Structural Block Heading Elements 
                    if (cleanLine.startsWith('# ')) {
                        htmlOutput.push(`<h1>${this.parseInlineStyles(cleanLine.slice(2))}</h1>`);
                    } 
                    else if (cleanLine.startsWith('## ')) {
                        htmlOutput.push(`<h2>${this.parseInlineStyles(cleanLine.slice(3))}</h2>`);
                    } 
                    else if (cleanLine.startsWith('### ')) {
                        htmlOutput.push(`<h3>${this.parseInlineStyles(cleanLine.slice(4))}</h3>`);
                    }
                    // 4. Blockquote Structural Panels Container Elements
                    else if (cleanLine.startsWith('> ')) {
                        htmlOutput.push(`blockquote>${this.parseInlineStyles(cleanLine.slice(2))}</blockquote`);
                    }
                    // 5. Default Standard Text Paragraph Elements Block Fallbacks
                    else {
                        htmlOutput.push(`<p>${this.parseInlineStyles(line)}</p>`);
                    }
                }

                // Append terminal closing tags if page ends abruptly while in list state pointer tracking
                if (this.inList) {
                    htmlOutput.push('</ul>');
                }

                return htmlOutput.join('\n');
            }

            // Sub-Parser parsing regex inline rules transformations matching text values (e.g. bold highlights)
            parseInlineStyles(text) {
                let formattedText = text;
                
                // Bold Transform: Replace pairs of double-asterisks with strong tags
                // Regex pattern catches matching **pairs** across inline context streams
                formattedText = formattedText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                
                return formattedText;
            }
        }

        // =====================================================================
        // LIVE REAL-TIME PIPELINE UI ENGINE UPDATE BINDING LINKS
        // =====================================================================
        function parseLiveDocument() {
            const editorEl = document.getElementById('editor');
            const previewEl = document.getElementById('preview-window');
            
            const parser = new MarkdownParser();
            const compiledHtml = parser.parse(editorEl.value);
            
            previewEl.innerHTML = compiledHtml;
        }

        // Auto-run structural parsing compiler logic on page launch right away
        window.onload = parseLiveDocument;
    </script>
</body>
</html>
