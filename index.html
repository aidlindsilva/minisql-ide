<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TinyScript Custom IDE & Interpreter</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #d4d4d4;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        h2 { margin-top: 0; color: #61dafb; }
        .container {
            display: flex;
            flex: 1;
            gap: 20px;
            min-height: 0;
        }
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 5px;
            color: #a9a9a9;
        }
        textarea {
            flex: 1;
            background-color: #2d2d2d;
            color: #9cdcfe;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            resize: none;
            outline: none;
        }
        textarea:focus { border-color: #007acc; }
        #console {
            flex: 1;
            background-color: #000;
            color: #00ff00;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        button {
            background-color: #007acc;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
        button:hover { background-color: #0062a3; }
        .error { color: #f44336; }
    </style>
</head>
<body>

    <h2>TinyScript Cloud IDE</h2>
    
    <div class="container">
        <div class="panel">
            <label for="editor">Source Code:</label>
            <textarea id="editor" spellcheck="false">
# Welcome to TinyScript!
# You can use variables, math, loops, and ifs.

let x = 1;
let target = 5;

while (x <= target) {
    if (x == 3) {
        print("Three is a special number!");
    } else {
        print("Current count is:");
        print(x);
    }
    x = x + 1;
}
            </textarea>
            <button onclick="runCode()">Execute Code</button>
        </div>

        <div class="panel">
            <label>Virtual Console Output:</label>
            <div id="console"></div>
        </div>
    </div>

    <script>
        // =====================================================================
        // 1. LEXER (Tokenizer)
        // Breaks raw text strings into meaningful token objects.
        // =====================================================================
        const TOKEN_TYPES = {
            KEYWORD: 'KEYWORD', IDENTIFIER: 'IDENTIFIER', NUMBER: 'NUMBER', 
            STRING: 'STRING', ASSIGN: 'ASSIGN', OPERATOR: 'OPERATOR', 
            PUNCTUATION: 'PUNCTUATION', EOF: 'EOF'
        };

        class Lexer {
            constructor(source) {
                this.source = source;
                this.cursor = 0;
            }

            peek() { return this.source[this.cursor] || null; }
            advance() { return this.source[this.cursor++]; }

            tokenize() {
                const tokens = [];
                const keywords = ['let', 'print', 'if', 'else', 'while'];

                while (this.cursor < this.source.length) {
                    let char = this.peek();

                    // Skip whitespace
                    if (/\s/.test(char)) { this.advance(); continue; }

                    // Skip Comments
                    if (char === '#') {
                        while (this.peek() && this.peek() !== '\n') this.advance();
                        continue;
                    }

                    // Numeric Constants
                    if (/\d/.test(char)) {
                        let num = '';
                        while (this.peek() && /\d/.test(this.peek())) num += this.advance();
                        tokens.push({ type: TOKEN_TYPES.NUMBER, value: parseInt(num) });
                        continue;
                    }

                    // Identifiers & Keywords
                    if (/[a-zA-Z]/.test(char)) {
                        let str = '';
                        while (this.peek() && /[a-zA-Z0-9]/.test(this.peek())) str += this.advance();
                        if (keywords.includes(str)) {
                            tokens.push({ type: TOKEN_TYPES.KEYWORD, value: str });
                        } else {
                            tokens.push({ type: TOKEN_TYPES.IDENTIFIER, value: str });
                        }
                        continue;
                    }

                    // String Literals
                    if (char === '"') {
                        this.advance(); // Skip opening quote
                        let str = '';
                        while (this.peek() && this.peek() !== '"') str += this.advance();
                        this.advance(); // Skip closing quote
                        tokens.push({ type: TOKEN_TYPES.STRING, value: str });
                        continue;
                    }

                    // Double character operators (==, <=, >=)
                    if (char === '=' || char === '<' || char === '>') {
                        let op = this.advance();
                        if (this.peek() === '=') {
                            op += this.advance();
                        }
                        tokens.push({ 
                            type: op === '=' ? TOKEN_TYPES.ASSIGN : TOKEN_TYPES.OPERATOR, 
                            value: op 
                        });
                        continue;
                    }

                    // Single character operators
                    if (['+', '-', '*', '/'].includes(char)) {
                        tokens.push({ type: TOKEN_TYPES.OPERATOR, value: this.advance() });
                        continue;
                    }

                    // Punctuation
                    if ([';', '(', ')', '{', '}'].includes(char)) {
                        tokens.push({ type: TOKEN_TYPES.PUNCTUATION, value: this.advance() });
                        continue;
                    }

                    throw new Error(`Lexer Error: Unexpected character '${char}'`);
                }

                tokens.push({ type: TOKEN_TYPES.EOF, value: null });
                return tokens;
            }
        }

        // =====================================================================
        // 2. PARSER
        // Transforms linear tokens into an Abstract Syntax Tree (AST) structure.
        // =====================================================================
        class Parser {
            constructor(tokens) {
                this.tokens = tokens;
                this.cursor = 0;
            }

            peek() { return this.tokens[this.cursor]; }
            advance() { return this.tokens[this.cursor++]; }
            match(type, value) {
                const token = this.peek();
                if (!token) return false;
                if (type && token.type !== type) return false;
                if (value && token.value !== value) return false;
                this.advance();
                return true;
            }

            parse() {
                const statements = [];
                while (this.peek().type !== TOKEN_TYPES.EOF) {
                    statements.push(this.parseStatement());
                }
                return { type: 'Program', body: statements };
            }

            parseStatement() {
                const token = this.peek();

                if (token.type === TOKEN_TYPES.KEYWORD) {
                    if (token.value === 'let') return this.parseVarDeclaration();
                    if (token.value === 'print') return this.parsePrintStatement();
                    if (token.value === 'if') return this.parseIfStatement();
                    if (token.value === 'while') return this.parseWhileStatement();
                }

                // Fallback to reassignment assignment check
                if (token.type === TOKEN_TYPES.IDENTIFIER) {
                    return this.parseAssignment();
                }

                throw new Error(`Parser Error: Unexpected token "${token.value}"`);
            }

            parseVarDeclaration() {
                this.advance(); // consume 'let'
                const idToken = this.advance();
                this.match(TOKEN_TYPES.ASSIGN, '=');
                const valExpression = this.parseExpression();
                this.match(TOKEN_TYPES.PUNCTUATION, ';');
                return { type: 'VariableDeclaration', id: idToken.value, init: valExpression };
            }
