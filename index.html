<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-SQL Relational Database IDE</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #e1e1e6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        h2 { margin-top: 0; color: #00b37e; }
        .container {
            display: flex;
            flex: 1;
            gap: 20px;
            min-height: 0;
        }
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 5px;
            color: #8d8d99;
        }
        textarea {
            flex: 1;
            background-color: #202024;
            color: #e1e1e6;
            border: 1px solid #323238;
            border-radius: 4px;
            padding: 12px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 15px;
            resize: none;
            outline: none;
        }
        textarea:focus { border-color: #00b37e; }
        #output-container {
            flex: 1;
            background-color: #121214;
            border: 1px solid #323238;
            border-radius: 4px;
            padding: 12px;
            overflow-y: auto;
        }
        button {
            background-color: #00b37e;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
        button:hover { background-color: #00875f; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background-color: #202024;
        }
        th, td {
            border: 1px solid #323238;
            padding: 8px 12px;
            text-align: left;
        }
        th { background-color: #29292e; color: #00b37e; }
        .error { color: #f75a68; font-family: monospace; }
        .success { color: #00b37e; font-family: monospace; margin-bottom: 8px; }
    </style>
</head>
<body>

    <h2>Mini-SQL Engine IDE</h2>
    
    <div class="container">
        <div class="panel">
            <label for="editor">SQL Script Queries:</label>
            <textarea id="editor" spellcheck="false">
-- Create a new relational memory entity table
CREATE TABLE students (id, name, course, score);

-- Insert row record tuples directly into table states
INSERT INTO students VALUES (1, "Rahul", "Computer Science", 92);
INSERT INTO students VALUES (2, "Ananya", "Information Technology", 85);
INSERT INTO students VALUES (3, "Arjun", "Computer Science", 78);

-- Select and extract filtered subsets 
SELECT name, score FROM students WHERE score > 80;
            </textarea>
            <button onclick="runSQL()">Execute SQL Queries</button>
        </div>

        <div class="panel">
            <label>Relational Query Engine Output:</label>
            <div id="output-container"></div>
        </div>
    </div>

    <script>
        class MiniSQLDatabase {
            constructor() {
                this.tables = {}; // Standard raw memory cache mapping rows
            }

            execute(queryStr) {
                const cleanQuery = queryStr.trim().replace(/;$/, '');
                
                if (cleanQuery.toUpperCase().startsWith('CREATE TABLE')) {
                    return this.handleCreate(cleanQuery);
                } 
                else if (cleanQuery.toUpperCase().startsWith('INSERT INTO')) {
                    return this.handleInsert(cleanQuery);
                } 
                else if (cleanQuery.toUpperCase().startsWith('SELECT')) {
                    return this.handleSelect(cleanQuery);
                }
                throw new Error(`SQL Engine Syntax Error: Unsupported or invalid command starting statement.`);
            }

            handleCreate(query) {
                const match = query.match(/CREATE\s+TABLE\s+(\w+)\s*\((.*)\)/i);
                if (!match) throw new Error("SQL Syntax Error: Invalid CREATE TABLE statement format.");
                
                const tableName = match[1].toLowerCase();
                const columns = match[2].split(',').map(c => c.trim().toLowerCase());
                
                this.tables[tableName] = { columns: columns, rows: [] };
                return { type: 'MSG', text: `Table "${tableName}" created successfully.` };
            }

            handleInsert(query) {
                const match = query.match(/INSERT\s+INTO\s+(\w+)\s+VALUES\s*\((.*)\)/i);
                if (!match) throw new Error("SQL Syntax Error: Invalid INSERT INTO statement format.");
                
                const tableName = match[1].toLowerCase();
                if (!(tableName in this.tables)) throw new Error(`Runtime Error: Table "${tableName}" does not exist.`);
                
                // Parse out values safely removing wrapper string quotes
                const rawValues = match[2].split(',');
                const cleanValues = rawValues.map(v => {
                    let item = v.trim();
                    if (item.startsWith('"') && item.endsWith('"')) return item.slice(1, -1);
                    if (item.startsWith("'") && item.endsWith("'")) return item.slice(1, -1);
                    return isNaN(item) ? item : Number(item);
                });

                const table = this.tables[tableName];
                if (cleanValues.length !== table.columns.length) {
                    throw new Error(`Data Error: Value count mismatch. Expected ${table.columns.length} values.`);
                }

                // Map row array values directly into column dictionary objects
                let rowObject = {};
                table.columns.forEach((col, index) => {
                    rowObject[col] = cleanValues[index];
                });

                table.rows.push(rowObject);
                return { type: 'MSG', text: `1 row inserted into "${tableName}".` };
            }

            handleSelect(query) {
                const match = query.match(/SELECT\s+(.+)\s+FROM\s+(\w+)(?:\s+WHERE\s+(.+))?/i);
                if (!match) throw new Error("SQL Syntax Error: Invalid SELECT statement format.");

                const fields = match[1].split(',').map(f => f.trim().toLowerCase());
                const tableName = match[2].toLowerCase();
                const whereClause = match[3];

                if (!(tableName in this.tables)) throw new Error(`Runtime Error: Table "${tableName}" does not exist.`);
                const table = this.tables[tableName];

                // Determine target selection columns output layout
                const outputColumns = fields[0] === '*' ? table.columns : fields;

                // Process rows passing evaluation filter conditions matching WHERE criteria
                let filteredRows = table.rows;
                if (whereClause) {
                    const condMatch = whereClause.match(/(\w+)\s*([>=<!]+)\s*(.+)/);
                    if (!condMatch) throw new Error("SQL Engine Error: Only simple WHERE filters are supported (e.g., column > value).");
                    
                    const colName = condMatch[1].toLowerCase();
                    const operator = condMatch[2];
                    let val = condMatch[3].trim().replace(/['"]/g, '');
                    val = isNaN(val) ? val : Number(val);

                    filteredRows = table.rows.filter(row => {
                        const cell = row[colName];
                        switch (operator) {
                            case '=':  return cell === val;
                            case '==': return cell === val;
                            case '>':  return cell > val;
                            case '<':  return cell < val;
                            case '>=': return cell >= val;
                            case '<=': return cell <= val;
                            default: return false;
                        }
                    });
                }

                // Compile result schema matrix mapping 
                const resultData = filteredRows.map(row => {
                    let projectedRow = {};
                    outputColumns.forEach(col => { projectedRow[col] = row[col]; });
                    return projectedRow;
                });

                return { type: 'TABLE', headers: outputColumns, rows: resultData };
            }
        }

        // =====================================================================
        // CORE IDE UI RENDER PIPELINE
        // =====================================================================
        function runSQL() {
            const container = document.getElementById('output-container');
            container.innerHTML = ""; // Flush previous dashboard layout

            const lines = document.getElementById('editor').value.split('\n');
            const db = new MiniSQLDatabase();

            let currentStatement = "";

            for (let line of lines) {
                let cleanLine = line.replace(/--.*$/, '').trim(); // Strip comment blocks lines
                if (!cleanLine) continue;

                currentStatement += " " + cleanLine;

                // Check statement closure terminator semicolon token 
                if (cleanLine.endsWith(';')) {
                    try {
                        const result = db.execute(currentStatement);
                        
                        if (result.type === 'MSG') {
                            container.innerHTML += `<div class="success">${result.text}</div>`;
                        } 
                        else if (result.type === 'TABLE') {
                            renderHTMLTable(container, result.headers, result.rows);
                        }
                    } catch (err) {
                        container.innerHTML += `<div class="error">${err.message}</div>`;
                        return; // Halt script execution pipeline parsing cascade on exception trace
                    }
                    currentStatement = ""; // Clear buffer queue target pointer location
                }
            }
        }

        function renderHTMLTable(targetEl, headers, rows) {
            if (rows.length === 0) {
                targetEl.innerHTML += `<div class="success">Query returned 0 record rows matching criteria.</div>`;
                return;
            }

            let html = '<table><tr>';
            headers.forEach(h => { html += `<th>${h.toUpperCase()}</th>`; });
            html += '</tr>';

            rows.forEach(row => {
                html += '<tr>';
                headers.forEach(h => { html += `<td>${row[h] !== undefined ? row[h] : 'NULL'}</td>`; });
                html += '</tr>';
            });

            html += '</table><br>';
            targetEl.innerHTML += html;
        }
    </script>
</body>
</html>
